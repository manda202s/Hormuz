<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1326"/>
      <stop offset="100%" style="stop-color:#111d3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Radar circles -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <!-- H letter -->
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#accent)" text-anchor="middle">H</text>
  <!-- Pulse dot -->
  <circle cx="24" cy="8" r="2.5" fill="#dc2626"/>
  <circle cx="24" cy="8" r="2.5" fill="#dc2626" opacity="0.4">
    <animate attributeName="r" values="2.5;5;2.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
